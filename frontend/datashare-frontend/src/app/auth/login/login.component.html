<div class="page">
  <!-- Top bar -->
  <div class="top-bar">
    <span class="logo">DataShare</span>
    <button class="top-btn" (click)="toggleLogin()">Se connecter</button>
  </div>

  <!-- Home iniziale -->
  <div *ngIf="!showLogin" class="home">
    <p>Tu veux partager un fichier ?</p>
    <div class="upload-circle" (click)="goToUpload()">
      <img src="assets/Test2.png" alt="upload">
    </div>
  </div>

  <!-- Card Login -->
  <div *ngIf="showLogin" class="card">
    <h2>Connexion</h2>
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <label>Email</label>
      <input type="email" [(ngModel)]="loginData.login" name="login" placeholder="Saisissez votre email..." required>

      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="loginData.password" name="password"
        placeholder="Saisissez votre mot de passe..." required>

      <button type="button" class="link-btn" (click)="goToRegister()">Créer un compte</button>
      <button type="submit"  [disabled]="loginForm.invalid" >Connexion</button>
    </form>

    <p class=" error" *ngIf="error">{{ error }}</p>
  </div>
</div>
